<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Password Recovery</title>

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect x='140' y='180' width='80' height='40' fill='%23a855f7' /%3E%3Crect x='140' y='220' width='40' height='80' fill='%23a855f7' /%3E%3Crect x='140' y='300' width='80' height='40' fill='%23a855f7' /%3E%3Crect x='180' y='260' width='40' height='80' fill='%23a855f7' /%3E%3Crect x='260' y='180' width='40' height='160' fill='%23ec4899' /%3E%3Crect x='300' y='180' width='40' height='80' fill='%23ec4899' /%3E%3Crect x='340' y='220' width='40' height='40' fill='%23ec4899' /%3E%3Crect x='380' y='180' width='40' height='80' fill='%23ec4899' /%3E%3Crect x='420' y='180' width='40' height='160' fill='%23ec4899' /%3E%3Crect x='235' y='250' width='20' height='20' fill='white' /%3E%3C/svg%3E"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "bg-dark": "#0b0c10",
              panel: "#111317",
              soft: "#171a21",
              "text-light": "#e6e8ec",
              muted: "#9aa3af",
              brand: "#6ee7ff",
              "brand-2": "#a78bfa",
            },
            fontFamily: {
              inter: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      .gradient-text {
        background: linear-gradient(135deg, #6ee7ff, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .gradient-button {
        background: linear-gradient(135deg, #6ee7ff, #a78bfa);
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body
    class="bg-[#0b0c10] text-[#e6e8ec] min-h-screen flex items-center justify-center"
  >
    <div class="bg-[#111317] rounded-2xl p-12 w-full max-w-md shadow-2xl">
      <h1 class="text-3xl font-bold mb-5 gradient-text text-center">
        <a href="/">Task Manager</a>
      </h1>

      <div id="emailStep">
        <h2 class="text-2xl font-semibold mb-3 text-center">Reset Password</h2>

        <p class="text-[#9aa3af] mb-8 text-sm text-center">
          Enter your email address and we will send you a verification PIN.
        </p>

        <input
          id="email"
          type="email"
          placeholder="Email"
          class="w-full px-4 py-3.5 mb-5 rounded-2xl border border-white/10 bg-[#171a21]"
        />

        <button
          id="sendPinBtn"
          class="w-full px-4 py-3.5 rounded-2xl gradient-button text-[#0b0c10] font-semibold"
        >
          <span id="sendPinText">Send PIN</span>

          <span id="sendPinLoader" class="hidden">
            <svg
              class="animate-spin inline w-5 h-5"
              viewBox="0 0 24 24"
              fill="none"
            >
              <circle
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
                opacity="0.25"
              />
              <path
                d="M4 12a8 8 0 018-8"
                stroke="currentColor"
                stroke-width="4"
                stroke-linecap="round"
              />
            </svg>

            Sending...
          </span>
        </button>
      </div>

      <div id="pinStep" class="hidden">
        <h2 class="text-2xl font-semibold mb-3 text-center">Verify PIN</h2>

        <p class="text-[#9aa3af] mb-8 text-sm text-center">
          Enter the 8 digit PIN sent to your email.
        </p>

        <input
          id="pin"
          maxlength="8"
          placeholder="12345678"
          class="w-full px-4 py-3.5 mb-5 rounded-2xl border border-white/10 bg-[#171a21]"
        />

        <button
          id="verifyPinBtn"
          class="w-full px-4 py-3.5 rounded-2xl gradient-button text-[#0b0c10] font-semibold"
        >
          Verify PIN
        </button>
      </div>

      <div id="passwordStep" class="hidden">
        <h2 class="text-2xl font-semibold mb-3 text-center">Create Password</h2>

        <p class="text-[#9aa3af] mb-8 text-sm text-center">
          Choose your new password.
        </p>

        <input
          id="newPassword"
          type="password"
          placeholder="New Password"
          class="w-full px-4 py-3.5 mb-4 rounded-2xl border border-white/10 bg-[#171a21]"
        />

        <input
          id="confirmPassword"
          type="password"
          placeholder="Confirm Password"
          class="w-full px-4 py-3.5 mb-5 rounded-2xl border border-white/10 bg-[#171a21]"
        />

        <button
          id="changePasswordBtn"
          class="w-full px-4 py-3.5 rounded-2xl gradient-button text-[#0b0c10] font-semibold"
        >
          Change Password
        </button>
      </div>

      <p id="message" class="mt-5 text-sm text-center hidden"></p>

      <div class="mt-5 text-sm text-[#9aa3af] text-center">
        <a href="/login" class="text-[#6ee7ff] hover:underline">
          Back to Login
        </a>
      </div>
    </div>

    <script>
      let userEmail = "";

      const emailStep = document.getElementById("emailStep");
      const pinStep = document.getElementById("pinStep");
      const passwordStep = document.getElementById("passwordStep");

      const message = document.getElementById("message");

      function showMessage(text, type = "error") {
        message.textContent = text;
        message.classList.remove("hidden");

        message.className =
          type === "success"
            ? "mt-5 text-sm text-center text-green-400"
            : "mt-5 text-sm text-center text-red-500";
      }

      function showStep(step) {
        emailStep.classList.add("hidden");
        pinStep.classList.add("hidden");
        passwordStep.classList.add("hidden");

        step.classList.remove("hidden");
      }

      document
        .getElementById("sendPinBtn")
        .addEventListener("click", async () => {
          userEmail = document.getElementById("email").value.trim();

          if (!userEmail) {
            return showMessage("Enter your email.");
          }

          try {
            const res = await fetch("/forgot-password", {
              method: "POST",

              headers: {
                "Content-Type": "application/json",
              },

              body: JSON.stringify({
                email: userEmail,
              }),
            });

            const data = await res.text();

            if (!res.ok) {
              return showMessage(data);
            }

            showMessage("PIN sent successfully.", "success");

            showStep(pinStep);
          } catch (err) {
            console.error(err);

            showMessage("Server error.");
          }
        });

      document
        .getElementById("verifyPinBtn")
        .addEventListener("click", async () => {
          const pin = document.getElementById("pin").value.trim();

          if (pin.length !== 8) {
            return showMessage("PIN must be 8 digits.");
          }

          try {
            const res = await fetch("/verify-reset-pin", {
              method: "POST",

              headers: {
                "Content-Type": "application/json",
              },

              body: JSON.stringify({
                email: userEmail,
                pin,
              }),
            });

            const data = await res.text();

            if (!res.ok) {
              return showMessage(data);
            }

            showMessage("PIN verified.", "success");

            showStep(passwordStep);
          } catch (err) {
            console.error(err);

            showMessage("Server error.");
          }
        });

      document
        .getElementById("changePasswordBtn")
        .addEventListener("click", async () => {
          const password = document.getElementById("newPassword").value;

          const confirm = document.getElementById("confirmPassword").value;

          if (password.length < 6) {
            return showMessage("Password must be at least 6 characters.");
          }

          if (password !== confirm) {
            return showMessage("Passwords do not match.");
          }

          try {
            const res = await fetch("/reset-password", {
              method: "POST",

              headers: {
                "Content-Type": "application/json",
              },

              body: JSON.stringify({
                password,
              }),
            });

            const data = await res.text();

            if (!res.ok) {
              return showMessage(data);
            }

            showMessage("Password changed successfully.", "success");

            setTimeout(() => {
              window.location.href = "/login";
            }, 2000);
          } catch (err) {
            console.error(err);

            showMessage("Server error.");
          }
        });
    </script>
  </body>
</html>
