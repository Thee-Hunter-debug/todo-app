<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-dark': '#0b0c10',
                        'panel': '#111317',
                        'soft': '#171a21',
                        'text-light': '#e6e8ec',
                        'muted': '#9aa3af',
                        'brand': '#6ee7ff',
                        'brand-2': '#a78bfa',
                    },
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .gradient-text {
            background: linear-gradient(135deg, #6ee7ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gradient-button {
            background: linear-gradient(135deg, #6ee7ff, #a78bfa);
        }
        .gradient-button:hover {
            filter: brightness(1.1);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        .pulse-animation {
            animation: pulse 2s ease-in-out infinite;
        }
        .glow {
            box-shadow: 0 0 40px rgba(110, 231, 255, 0.3);
        }
    </style>
</head>
<body class="bg-[#0b0c10] text-[#e6e8ec] min-h-screen flex items-center justify-center font-inter overflow-hidden">
    <!-- Animated background elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-20 w-72 h-72 bg-[#6ee7ff] rounded-full mix-blend-multiply filter blur-xl opacity-10 float-animation"></div>
        <div class="absolute top-40 right-20 w-72 h-72 bg-[#a78bfa] rounded-full mix-blend-multiply filter blur-xl opacity-10 float-animation" style="animation-delay: 1s;"></div>
        <div class="absolute bottom-20 left-1/2 w-72 h-72 bg-[#ff6b9d] rounded-full mix-blend-multiply filter blur-xl opacity-10 float-animation" style="animation-delay: 2s;"></div>
    </div>

    <div class="relative z-10 bg-[#111317] rounded-2xl p-12 w-full max-w-lg shadow-2xl text-center border border-white/5">
        <!-- Logo/Brand -->
        <h1 class="text-4xl font-bold mb-8 gradient-text">
            <a href="TodoSysLand.html" class="hover:opacity-80 transition-opacity">Task Manager</a>
        </h1>
        
        <!-- 404 Number -->
        <div class="mb-8">
            <h2 class="text-9xl font-extrabold gradient-text float-animation glow" style="line-height: 1;">
                404
            </h2>
        </div>

        <!-- Error Message -->
        <h3 class="text-2xl font-semibold mb-4 text-[#e6e8ec]">
            Page Not Found
        </h3>
        <p class="text-[#9aa3af] mb-8 text-base leading-relaxed">
            Oops! The page you're looking for doesn't exist or has been moved. 
            <br>Let's get you back on track.
        </p>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center mb-6">
            <a 
                href="TodoSysLand.html" 
                class="px-6 py-3 rounded-2xl gradient-button text-[#0b0c10] font-semibold text-base cursor-pointer transition-all hover:-translate-y-0.5 hover:shadow-lg w-full sm:w-auto text-center"
            >
                🏠 Go Home
            </a>
            <button 
                onclick="window.history.back()" 
                class="px-6 py-3 rounded-2xl bg-[#171a21] text-[#e6e8ec] font-semibold text-base cursor-pointer transition-all hover:bg-[#1f2329] border border-white/10 w-full sm:w-auto"
            >
                ← Go Back
            </button>
        </div>

        <!-- Additional Links -->
        <div class="mt-8 pt-6 border-t border-white/10">
            <p class="text-sm text-[#9aa3af] mb-3">Quick Links:</p>
            <div class="flex flex-wrap justify-center gap-4 text-sm">
                <a href="Login.html" class="text-[#6ee7ff] hover:underline transition-colors">Login</a>
                <span class="text-[#9aa3af]">•</span>
                <a href="Signup.html" class="text-[#6ee7ff] hover:underline transition-colors">Sign Up</a>
                <span class="text-[#9aa3af]">•</span>
                <a href="TodoSysLand.html" class="text-[#6ee7ff] hover:underline transition-colors">Landing Page</a>
            </div>
        </div>

        <!-- Fun element -->
        <div class="mt-8 pulse-animation">
            <p class="text-4xl">🔍</p>
        </div>
    </div>

    <script>
        // Add some interactivity
        document.addEventListener('DOMContentLoaded', () => {
            // Animate the 404 number on load
            const errorNumber = document.querySelector('.text-9xl');
            if (errorNumber) {
                errorNumber.style.opacity = '0';
                errorNumber.style.transform = 'scale(0.5)';
                setTimeout(() => {
                    errorNumber.style.transition = 'all 0.5s ease-out';
                    errorNumber.style.opacity = '1';
                    errorNumber.style.transform = 'scale(1)';
                }, 100);
            }
        });
    </script>
</body>
</html>
