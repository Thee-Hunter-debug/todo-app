<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
     <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect x='140' y='180' width='80' height='40' fill='%23a855f7' /%3E%3Crect x='140' y='220' width='40' height='80' fill='%23a855f7' /%3E%3Crect x='140' y='300' width='80' height='40' fill='%23a855f7' /%3E%3Crect x='180' y='260' width='40' height='80' fill='%23a855f7' /%3E%3Crect x='260' y='180' width='40' height='160' fill='%23ec4899' /%3E%3Crect x='300' y='180' width='40' height='80' fill='%23ec4899' /%3E%3Crect x='340' y='220' width='40' height='40' fill='%23ec4899' /%3E%3Crect x='380' y='180' width='40' height='80' fill='%23ec4899' /%3E%3Crect x='420' y='180' width='40' height='160' fill='%23ec4899' /%3E%3Crect x='235' y='250' width='20' height='20' fill='white' /%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-dark': '#0b0c10',
                        'panel': '#111317',
                        'soft': '#171a21',
                        'text-light': '#e6e8ec',
                        'muted': '#9aa3af',
                        'brand': '#6ee7ff',
                        'brand-2': '#a78bfa',
                    },
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .gradient-text {
            background: linear-gradient(135deg, #6ee7ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gradient-button {
            background: linear-gradient(135deg, #6ee7ff, #a78bfa);
        }
        .gradient-button:hover {
            filter: brightness(1.1);
        }
        .gradient-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-[#0b0c10] text-[#e6e8ec] min-h-screen flex items-center justify-center font-inter">
    <div class="bg-[#111317] rounded-2xl p-12 w-full max-w-md shadow-2xl">
        <h1 class="text-3xl font-bold mb-5 gradient-text text-center">
            <a href="/" class="hover:opacity-80 transition-opacity">Task Manager</a>
        </h1>
        
        <h2 class="text-2xl font-semibold mb-3 text-center">Change Password</h2>
        <p class="text-[#9aa3af] mb-8 text-sm text-center">Please enter your current password and choose a new one.</p>

        <form id="changePasswordForm" class="flex flex-col gap-5">
            <input 
                type="password" 
                id="currentPassword"
                name="currentPassword"
                placeholder="Current Password" 
                required
                class="px-4 py-3.5 rounded-2xl border border-white/10 bg-[#171a21] text-[#e6e8ec] placeholder:text-[#9aa3af] text-base focus:outline-none focus:border-[#6ee7ff]/50 transition-colors"
            >
            <input 
                type="password" 
                id="newPassword"
                name="newPassword"
                placeholder="New Password (min. 6 characters)" 
                required
                minlength="6"
                class="px-4 py-3.5 rounded-2xl border border-white/10 bg-[#171a21] text-[#e6e8ec] placeholder:text-[#9aa3af] text-base focus:outline-none focus:border-[#6ee7ff]/50 transition-colors"
            >
            <input 
                type="password" 
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Confirm New Password" 
                required
                minlength="6"
                class="px-4 py-3.5 rounded-2xl border border-white/10 bg-[#171a21] text-[#e6e8ec] placeholder:text-[#9aa3af] text-base focus:outline-none focus:border-[#6ee7ff]/50 transition-colors"
            >
            <button 
                type="submit" 
                id="submitBtn"
                class="px-4 py-3.5 rounded-2xl gradient-button text-[#0b0c10] font-semibold text-base cursor-pointer transition-all hover:-translate-y-0.5 hover:shadow-lg"
            >
                Change Password
            </button>
            <p id="errorMsg" class="text-sm text-red-500 hidden"></p>
            <p id="successMsg" class="text-sm text-green-400 hidden"></p>
        </form>

        <div class="mt-5 text-sm text-[#9aa3af] text-center">
            <a href="/" class="text-[#6ee7ff] hover:underline">Back to Home</a>
        </div>
    </div>

    <script>
        const form = document.getElementById("changePasswordForm");
        const currentPasswordInput = document.getElementById("currentPassword");
        const newPasswordInput = document.getElementById("newPassword");
        const confirmPasswordInput = document.getElementById("confirmPassword");
        const errorMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");
        const submitButton = document.getElementById("submitBtn");

        confirmPasswordInput.addEventListener("input", () => {
            if (confirmPasswordInput.value && newPasswordInput.value !== confirmPasswordInput.value) {
                confirmPasswordInput.style.borderColor = "rgba(252, 165, 165, 0.5)";
            } else {
                confirmPasswordInput.style.borderColor = "rgba(255, 255, 255, 0.1)";
            }
        });

        newPasswordInput.addEventListener("input", () => {
            if (confirmPasswordInput.value && newPasswordInput.value !== confirmPasswordInput.value) {
                confirmPasswordInput.style.borderColor = "rgba(252, 165, 165, 0.5)";
            } else {
                confirmPasswordInput.style.borderColor = "rgba(255, 255, 255, 0.1)";
            }
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            

            errorMsg.textContent = "";
            successMsg.textContent = "";
            errorMsg.classList.add("hidden");
            successMsg.classList.add("hidden");

            const currentPassword = currentPasswordInput.value.trim();
            const newPassword = newPasswordInput.value.trim();
            const confirmPassword = confirmPasswordInput.value.trim();

            // Client-side validation
            if (!currentPassword || !newPassword || !confirmPassword) {
                errorMsg.textContent = "All fields are required.";
                errorMsg.classList.remove("hidden");
                return;
            }

            if (newPassword.length < 6) {
                errorMsg.textContent = "New password must be at least 6 characters.";
                errorMsg.classList.remove("hidden");
                return;
            }

            if (newPassword !== confirmPassword) {
                errorMsg.textContent = "New passwords do not match.";
                errorMsg.classList.remove("hidden");
                return;
            }

            if (currentPassword === newPassword) {
                errorMsg.textContent = "New password must be different from current password.";
                errorMsg.classList.remove("hidden");
                return;
            }

            // Disable button and show loading state
            submitButton.disabled = true;
            submitButton.textContent = "Changing...";
            submitButton.style.opacity = "0.6";

            try {
                const response = await fetch("/change-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        currentPassword,
                        newPassword,
                        confirmPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    successMsg.textContent = data.message || "Password changed successfully!";
                    successMsg.classList.remove("hidden");
                    
                    // Clear form
                    form.reset();
                    
                    // Redirect to home after 2 seconds
                    setTimeout(() => {
                        window.location.href = "/home";
                    }, 2000);
                } else {
                    errorMsg.textContent = data.error || "Failed to change password.";
                    errorMsg.classList.remove("hidden");
                    submitButton.disabled = false;
                    submitButton.textContent = "Change Password";
                    submitButton.style.opacity = "1";
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = "Server error. Please try again later.";
                errorMsg.classList.remove("hidden");
                submitButton.disabled = false;
                submitButton.textContent = "Change Password";
                submitButton.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
